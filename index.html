<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <!-- Theme switcher -->
    <button class="theme-switch" aria-label="Toggle theme">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>

            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <div class="container">
        <header>
            <img src="" alt="Profile" class="profile-img">
            <h1></h1>
            <p class="tagline"></p>
            <div class="social-links"></div>
        </header>

        <section class="about"></section>

        <section class="experience">
            <h2></h2>
            <div class="experience-item">
                <div class="experience-content">
                    <h3></h3>
                    <p class="date"></p>
                    <ul></ul>
                </div>
                <div class="company-logo">
                    <img src="" alt="" class="light-mode-logo">
                    <img src="" alt="" class="dark-mode-logo">
                </div>
            </div>
            <div class="experience-item">
                <div class="experience-content">
                    <h3></h3>
                    <p class="date"></p>
                    <ul></ul>
                </div>
                <div class="company-logo">
                    <img src="" alt="" class="light-mode-logo">
                    <img src="" alt="" class="dark-mode-logo">
                </div>
            </div>
            <div class="experience-item">
                <div class="experience-content">
                    <h3></h3>
                    <p class="date"></p>
                    <ul></ul>
                </div>
                <div class="company-logo">
                    <img src="" alt="" class="light-mode-logo">
                    <img src="" alt="" class="dark-mode-logo">
                </div>
            </div>
            <div class="experience-item">
                <div class="experience-content">
                    <h3></h3>
                    <p class="date"></p>
                    <ul></ul>
                </div>
                <div class="company-logo">
                    <img src="" alt="" class="light-mode-logo">
                    <img src="" alt="" class="dark-mode-logo">
                </div>
            </div>
        </section>

        <section class="skills">
            <h2></h2>
            <div class="skills-grid"></div>
        </section>

        <section class="projects-section">
            <h2>Latest Projects</h2>
            <div id="projects" class="projects">
                <div class="loading">Loading projects...</div>
            </div>
        </section>
    </div>
    
    <script>
        // Verify js-yaml loaded correctly
        window.addEventListener('load', function() {
            if (typeof jsyaml === 'undefined') {
                document.body.innerHTML = `
                    <div style="color: red; padding: 20px; text-align: center;">
                        <h1>Error Loading Dependencies</h1>
                        <p>Failed to load js-yaml library. Please try refreshing the page.</p>
                        <p>If the problem persists, please contact the administrator.</p>
                    </div>`;
            }
        });
    </script>
    <script src="scripts.js"></script>

    <!-- Social Icons Templates -->
    <template id="linkedin-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
            <rect x="2" y="9" width="4" height="12"></rect>
            <circle cx="4" cy="4" r="2"></circle>
        </svg>
    </template>
    <template id="github-icon">

        </svg>
