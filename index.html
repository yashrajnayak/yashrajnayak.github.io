<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Developer Portfolio - yashrajnayak">
    <title>yashrajnayak - Developer Portfolio</title>
    <style>
        /* Modern CSS Reset */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Custom Properties */
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e293b;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-radius: 1rem;
            --transition: all 0.3s ease;
        }

        /* Dark mode */
        :root[data-theme="dark"] {
            --background-color: #0f172a;
            --card-background: #1e293b;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
        }
        
        /* Base Styles */
        body {
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: var(--transition);
        }
        
        /* Container */
        .container {
            width: min(1200px, 90%);
            margin: 0 auto;
            padding: clamp(1rem, 5vw, 3rem);
        }
        
        /* Theme Switcher */
        .theme-switch {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card-background);
            border: 2px solid var(--text-muted);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            transition: var(--transition);
            z-index: 1000;
        }

        .theme-switch:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .theme-switch svg {
            width: 1.25rem;
            height: 1.25rem;
        }
        
        /* Header Section */
        header {
            text-align: center;
            margin-bottom: clamp(2rem, 8vw, 5rem);
            animation: fadeIn 1s ease;
        }
        
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            border: 4px solid var(--card-background);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: var(--transition);
        }
        
        .profile-img:hover {
            transform: scale(1.05);
        }
        
        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .social-links a {
            color: var(--text-color);
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius);
            background-color: var(--card-background);
            transition: var(--transition);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .social-links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.1);
        }
        
        /* Projects Grid */
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
            gap: clamp(1rem, 3vw, 2rem);
            margin-top: 2rem;
        }
        
        .project-card {
            background-color: var(--card-background);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            animation: slideUp 0.5s ease;
            animation-fill-mode: both;
        }
        
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.1);
        }
        
        .project-card h3 {
            margin-bottom: 0.75rem;
            color: var(--primary-color);
        }
        
        .project-card p {
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .project-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .project-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .project-links a:hover {
            text-decoration: underline;
            opacity: 0.9;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding: 1rem;
            }
            
            .profile-img {
                width: 140px;
                height: 140px;
            }
            
            .social-links {
                flex-direction: column;
                align-items: stretch;
            }
            
            .social-links a {
                text-align: center;
                justify-content: center;
            }

            .theme-switch {
                top: auto;
                bottom: 1rem;
                right: 1rem;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }
            .container {
                width: 100%;
                padding: 0;
            }
            .project-card {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .theme-switch {
                display: none;
            }
        }
    </style>
</head>
<body>
    <button class="theme-switch" aria-label="Toggle theme">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <span class="theme-text">Switch Theme</span>
    </button>

    <div class="container">
        <header>
            <img src="https://avatars.githubusercontent.com/yashrajnayak" alt="Profile" class="profile-img">
            <h1>Hi, I'm yashrajnayak 👋</h1>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/yashrajnayak/" target="_blank" rel="noopener noreferrer">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                        <rect x="2" y="9" width="4" height="12"></rect>
                        <circle cx="4" cy="4" r="2"></circle>
                    </svg>
                    LinkedIn
                </a>
                <a href="https://github.com/yashrajnayak" target="_blank" rel="noopener noreferrer">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                    </svg>
                    GitHub
                </a>
            </div>
        </header>
        
        <div id="projects" class="projects">
            <div class="loading">Loading projects...</div>
        </div>
    </div>
    
    <script>
        // Theme Switcher
        const themeSwitch = document.querySelector('.theme-switch');
        const sunIcon = document.querySelector('.sun-icon');
        const moonIcon = document.querySelector('.moon-icon');
        const themeText = document.querySelector('.theme-text');
        const root = document.documentElement;

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        root.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);

        themeSwitch.addEventListener('click', () => {
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        });

        function updateThemeUI(theme) {
            if (theme === 'dark') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
                themeText.textContent = 'Light Mode';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
                themeText.textContent = 'Dark Mode';
            }
        }

        // Fetch GitHub projects with error handling and loading states
        async function fetchGitHubProjects() {
            const projectsContainer = document.getElementById('projects');
            
            try {
                const response = await fetch(`https://api.github.com/users/yashrajnayak/repos?sort=updated&per_page=6`);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch projects');
                }
                
                const repos = await response.json();
                
                // Clear loading message
                projectsContainer.innerHTML = '';
                
                // Add projects with staggered animation
                repos.forEach((repo, index) => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    card.innerHTML = `
                        <h3>${repo.name}</h3>
                        <p>${repo.description || 'No description available'}</p>
                        <div class="project-links">
                            <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer">View Repository</a>
                            ${repo.homepage ? `<a href="${repo.homepage}" target="_blank" rel="noopener noreferrer">Live Demo</a>` : ''}
                        </div>
                    `;
                    
                    projectsContainer.appendChild(card);
                });
            } catch (error) {
                projectsContainer.innerHTML = `
                    <div class="loading">
                        Failed to load projects. Please check your GitHub username and try again.
                    </div>
                `;
                console.error('Error fetching GitHub projects:', error);
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', fetchGitHubProjects);
    </script>
</body>
</html>
