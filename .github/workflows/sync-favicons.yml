name: Sync Favicons From GitHub Avatar

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'
  push:
    branches: [main]
    paths: ['config.json']

jobs:
  sync-favicons:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install image tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Sync favicon assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:favicons

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- assets/favicons index.html site.webmanifest; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit favicon updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/favicons index.html site.webmanifest
          git commit -m "🤖 Sync favicons with GitHub avatar"
          git push
