name: Update Profile README from Config

on:
  push:
    branches: [main]
    paths: ['config.json']
  workflow_dispatch:

jobs:
  update-profile-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate config.json
        run: |
          echo "🔍 Validating config.json..."
          if [ ! -f "config.json" ]; then
            echo "❌ config.json not found"
            exit 1
          fi
          
          if ! jq empty config.json 2>/dev/null; then
            echo "❌ config.json is not valid JSON"
            exit 1
          fi
          
          echo "✅ config.json is valid"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check profile repository token
        id: profile-token
        env:
          GH_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PROFILE_REPO_TOKEN is not configured. Skipping profile README update."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh api repos/yashrajnayak/yashrajnayak >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::PROFILE_REPO_TOKEN is invalid or cannot access yashrajnayak/yashrajnayak. Skipping profile README update."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout profile repository
        if: steps.profile-token.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: yashrajnayak/yashrajnayak
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile-repo

      - name: Generate Profile README
        if: steps.profile-token.outputs.available == 'true'
        run: |
          echo "🚀 Generating Profile README from config.json..."
          node .github/workflows/update-profile-readme.js

      - name: Check for changes in profile repo
        if: steps.profile-token.outputs.available == 'true'
        id: verify-changed-files
        run: |
          cd profile-repo
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes to profile repository
        if: steps.profile-token.outputs.available == 'true' && steps.verify-changed-files.outputs.changed == 'true'
        run: |
          cd profile-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "🤖 Auto-update README.md from portfolio config.json"
          git push
